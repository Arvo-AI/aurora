{{- if .Values.services.memgraph.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "aurora.fullname" . }}-memgraph
  labels:
    {{- include "aurora.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "aurora.fullname" . }}-memgraph
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aurora.name" . }}-memgraph
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "aurora.name" . }}-memgraph
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: aurora
    spec:
      automountServiceAccountToken: false
      containers:
        - name: memgraph
          image: {{ include "aurora.thirdPartyImage" (dict "root" $ "image" "memgraph-mage:3.8.1" "default" "memgraph/memgraph-mage:3.8.1") }}
          imagePullPolicy: IfNotPresent
          args:
            - "--memory-limit=512"
            - "--log-level=ERROR"
            - "--also-log-to-stderr"
          ports:
            - name: bolt
              containerPort: 7687
            - name: monitoring
              containerPort: 7444
          env:
            - name: MEMGRAPH_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "aurora.fullname" . }}-secrets-db
                  key: MEMGRAPH_USER
            - name: MEMGRAPH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "aurora.fullname" . }}-secrets-db
                  key: MEMGRAPH_PASSWORD
          volumeMounts:
            - name: memgraph-data
              mountPath: /var/lib/memgraph
          readinessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.resources.memgraph | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: memgraph-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.persistence.memgraph.size }}
{{- end }}
