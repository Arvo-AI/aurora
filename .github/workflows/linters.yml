name: Linters

on:
  push:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-24.04
    name: gitleaks
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          wget -qO- "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run gitleaks
        run: |
          gitleaks detect --config .gitleaks.toml --source . --no-git --verbose --exit-code 1

  pre-checks:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        # pytest                       -> test runner
        # Flask                        -> imported by utils.db.connection_pool and the
        #                                 connection-pool test (Flask request context)
        # psycopg2-binary              -> connection_pool.py imports psycopg2 at module
        #                                 import time even though the pool is mocked
        # python-dotenv                -> connection_pool.py calls load_dotenv() on import
        run: pip install pytest Flask psycopg2-binary python-dotenv

      - name: Run static analysis & unit tests
        working-directory: server
        run: |
          tests=(
            tests/architectural/test_connector_rbac.py
            tests/db/test_connection_pool.py
          )
          if [ -f tests/architectural/test_rls_coverage.py ]; then
            tests+=(tests/architectural/test_rls_coverage.py)
          else
            echo "::warning::tests/architectural/test_rls_coverage.py not present yet; skipping."
          fi
          python -m pytest "${tests[@]}" -v
