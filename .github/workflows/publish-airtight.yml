name: Publish Airtight Bundles

# Same triggers as publish-images.yml:
#   - Git tag v*.*.* → tags as :1.2.3, :1.2, and :latest
#   - Push to main  → tags as :edge and :sha-<short>
#   - Manual trigger (workflow_dispatch) for hotfixes
on:
  push:
    branches: [main, airtight-packages]
    tags: ['v*.*.*']
  workflow_dispatch:

concurrency:
  group: publish-airtight-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  ORAS_VERSION: "1.2.2"

permissions:
  contents: read
  packages: write

jobs:
  airtight:
    name: Airtight ${{ matrix.arch }}
    runs-on: ubuntu-24.04
    if: github.repository == 'Arvo-AI/aurora'

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            package: ghcr.io/arvo-ai/aurora-airtight-amd64
          - arch: arm64
            platform: linux/arm64
            package: ghcr.io/arvo-ai/aurora-airtight-arm64

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/share/swift /opt/hostedtoolcache
          sudo apt-get -qq purge -y 'dotnet-*' 'aspnetcore-*' 'llvm-*' google-cloud-cli \
            azure-cli microsoft-edge-stable google-chrome-stable 2>/dev/null || true
          sudo apt-get -qq autoremove -y
          docker system prune -af
          echo "Free space: $(df -h / | tail -1 | awk '{print $4}')"

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute version tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract metadata (for oras tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.package }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}
            type=edge,branch=main
            type=sha,prefix=sha-,format=short

      - name: Build Aurora images
        run: |
          docker buildx build --platform ${{ matrix.platform }} \
            -f server/Dockerfile --target prod \
            -t aurora_server:latest --load ./server

          docker tag aurora_server:latest aurora_celery-worker:latest
          docker tag aurora_server:latest aurora_celery-beat:latest
          docker tag aurora_server:latest aurora_chatbot:latest

          docker buildx build --platform ${{ matrix.platform }} \
            -f client/Dockerfile --target prod \
            -t aurora_frontend:latest --load ./client

      - name: Pull third-party images
        run: |
          images=(
            "postgres:15-alpine"
            "redis:7-alpine"
            "hashicorp/vault:1.15"
            "busybox:1.37.0"
            "searxng/searxng:2025.5.8-7ca24eee4"
            "chrislusf/seaweedfs:4.07"
            "amazon/aws-cli:2.34.6"
            "memgraph/memgraph-mage:3.8.1"
            "memgraph/lab:3.8.0"
            "cr.weaviate.io/semitechnologies/weaviate:1.27.6"
            "cr.weaviate.io/semitechnologies/transformers-inference:sentence-transformers-all-MiniLM-L6-v2"
          )
          for img in "${images[@]}"; do
            echo "Pulling $img..."
            docker pull --platform ${{ matrix.platform }} "$img"
          done

      - name: Create tarball and checksum
        id: tarball
        run: |
          FILENAME="aurora-airtight-${{ steps.version.outputs.tag }}-${{ matrix.arch }}.tar.gz"

          docker save \
            aurora_server:latest aurora_celery-worker:latest aurora_celery-beat:latest \
            aurora_chatbot:latest aurora_frontend:latest \
            postgres:15-alpine redis:7-alpine hashicorp/vault:1.15 busybox:1.37.0 \
            "searxng/searxng:2025.5.8-7ca24eee4" "chrislusf/seaweedfs:4.07" \
            "amazon/aws-cli:2.34.6" "memgraph/memgraph-mage:3.8.1" "memgraph/lab:3.8.0" \
            "cr.weaviate.io/semitechnologies/weaviate:1.27.6" \
            "cr.weaviate.io/semitechnologies/transformers-inference:sentence-transformers-all-MiniLM-L6-v2" \
          | gzip > "$FILENAME"

          sha256sum "$FILENAME" > "${FILENAME}.sha256"
          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"
          echo "Bundle: $FILENAME ($(du -h "$FILENAME" | cut -f1))"

      - name: Install oras
        run: |
          curl -sLO "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz"
          tar -xzf "oras_${ORAS_VERSION}_linux_amd64.tar.gz" -C /usr/local/bin oras
          oras version

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push to GHCR
        run: |
          FILENAME="${{ steps.tarball.outputs.filename }}"

          # metadata-action outputs newline-separated fully-qualified tags; extract the tag portion
          TAGS=$(echo "${{ steps.meta.outputs.tags }}" | sed 's|.*/aurora-airtight-[^:]*:||')

          for tag in $TAGS; do
            echo "Pushing ${{ matrix.package }}:${tag}..."
            oras push "${{ matrix.package }}:${tag}" \
              "$FILENAME:application/gzip" \
              "${FILENAME}.sha256:text/plain"
          done

  publish-summary:
    name: Airtight Summary
    runs-on: ubuntu-24.04
    needs: [airtight]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "================================================"
          echo "Airtight Bundle Publish Summary"
          echo "================================================"
          echo "Result: ${{ needs.airtight.result }}"
          if [ "${{ needs.airtight.result }}" != "success" ]; then
            echo "One or more airtight builds failed!"
            exit 1
          fi
          echo "All airtight bundles published successfully"
