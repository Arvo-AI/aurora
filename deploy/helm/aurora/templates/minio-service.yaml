{{- if .Values.services.minio.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aurora.fullname" . }}-minio
  labels:
    {{- include "aurora.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "aurora.name" . }}-minio
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
{{- end }}
