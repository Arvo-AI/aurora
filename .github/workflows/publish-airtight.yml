name: Publish Airtight Bundles

# Same triggers as publish-images.yml:
#   - Git tag v*.*.* → tags as :1.2.3, :1.2, and :latest
#   - Push to main  → tags as :edge and :sha-<short>
#   - Manual trigger (workflow_dispatch) for hotfixes
on:
  push:
    branches: [main, airtight-packages]
    tags: ['v*.*.*']
  workflow_dispatch:

concurrency:
  group: publish-airtight-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  airtight:
    name: Airtight ${{ matrix.arch }}
    runs-on: ubuntu-24.04
    if: github.repository == 'Arvo-AI/aurora'

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            bucket: gs://aurora-airtight-bucket
            bucket_url: https://storage.googleapis.com/aurora-airtight-bucket
          - arch: arm64
            platform: linux/arm64
            bucket: gs://aurora-airtight-bucket-arm64
            bucket_url: https://storage.googleapis.com/aurora-airtight-bucket-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Compute version tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Aurora images
        run: |
          docker buildx build --platform ${{ matrix.platform }} \
            -f server/Dockerfile --target prod \
            -t aurora_server:latest --load ./server

          docker tag aurora_server:latest aurora_celery-worker:latest
          docker tag aurora_server:latest aurora_celery-beat:latest
          docker tag aurora_server:latest aurora_chatbot:latest

          docker buildx build --platform ${{ matrix.platform }} \
            -f client/Dockerfile --target prod \
            -t aurora_frontend:latest --load ./client

      - name: Pull third-party images
        run: |
          images=(
            "postgres:15-alpine"
            "redis:7-alpine"
            "hashicorp/vault:1.15"
            "busybox:1.37.0"
            "searxng/searxng:2025.5.8-7ca24eee4"
            "chrislusf/seaweedfs:4.07"
            "amazon/aws-cli:2.34.6"
            "memgraph/memgraph-mage:3.8.1"
            "memgraph/lab:3.8.0"
            "cr.weaviate.io/semitechnologies/weaviate:1.27.6"
            "cr.weaviate.io/semitechnologies/transformers-inference:sentence-transformers-all-MiniLM-L6-v2"
          )
          for img in "${images[@]}"; do
            echo "Pulling $img..."
            docker pull --platform ${{ matrix.platform }} "$img"
          done

      - name: Create tarball and checksum
        id: tarball
        run: |
          FILENAME="aurora-airtight-${{ steps.version.outputs.tag }}-${{ matrix.arch }}.tar.gz"

          docker save \
            aurora_server:latest aurora_celery-worker:latest aurora_celery-beat:latest \
            aurora_chatbot:latest aurora_frontend:latest \
            postgres:15-alpine redis:7-alpine hashicorp/vault:1.15 busybox:1.37.0 \
            "searxng/searxng:2025.5.8-7ca24eee4" "chrislusf/seaweedfs:4.07" \
            "amazon/aws-cli:2.34.6" "memgraph/memgraph-mage:3.8.1" "memgraph/lab:3.8.0" \
            "cr.weaviate.io/semitechnologies/weaviate:1.27.6" \
            "cr.weaviate.io/semitechnologies/transformers-inference:sentence-transformers-all-MiniLM-L6-v2" \
          | gzip > "$FILENAME"

          sha256sum "$FILENAME" > "${FILENAME}.sha256"
          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"
          echo "Bundle: $FILENAME ($(du -h "$FILENAME" | cut -f1))"

      - name: Upload to GCS
        run: |
          FILENAME="${{ steps.tarball.outputs.filename }}"
          gcloud storage cp "$FILENAME" "${{ matrix.bucket }}/"
          gcloud storage cp "${FILENAME}.sha256" "${{ matrix.bucket }}/"
          echo "Uploaded to ${{ matrix.bucket }}/$FILENAME"

      - name: Attest build provenance
        id: attest
        uses: actions/attest@v2
        with:
          subject-path: ${{ steps.tarball.outputs.filename }}

      - name: Register linked artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILENAME="${{ steps.tarball.outputs.filename }}"
          DIGEST="sha256:$(cut -d' ' -f1 "${FILENAME}.sha256")"
          VERSION="${{ steps.version.outputs.tag }}"
          ARTIFACT_URL="${{ matrix.bucket_url }}/${FILENAME}"

          gh api -X POST /orgs/Arvo-AI/artifacts/metadata/storage-record \
            -f name="aurora-airtight-${{ matrix.arch }}" \
            -f digest="$DIGEST" \
            -f version="$VERSION" \
            -f artifact_url="$ARTIFACT_URL" \
            -f registry_url="${{ matrix.bucket_url }}/" \
            -f status="active" \
            -f github_repository="aurora"

  publish-summary:
    name: Airtight Summary
    runs-on: ubuntu-24.04
    needs: [airtight]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "================================================"
          echo "Airtight Bundle Publish Summary"
          echo "================================================"
          echo "Result: ${{ needs.airtight.result }}"
          if [ "${{ needs.airtight.result }}" != "success" ]; then
            echo "One or more airtight builds failed!"
            exit 1
          fi
          echo "All airtight bundles published successfully"
