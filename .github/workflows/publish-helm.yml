name: Publish Helm Chart

# Trigger on:
#   - Git tag v*.*.* → publishes chart to GitHub Pages AND GHCR OCI registry
#   - Manual trigger (workflow_dispatch) for hotfixes
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

concurrency:
  group: publish-helm-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # GitHub Pages release assets
  packages: write   # GHCR OCI push
  pages: write      # gh-pages branch

env:
  CHART_DIR: deploy/helm
  OCI_REGISTRY: ghcr.io
  OCI_REPO: ghcr.io/arvo-ai/charts

jobs:
  # ===========================================================================
  # Method 1: GitHub Pages via chart-releaser
  # Your Pages URL serves Docusaurus docs, so use the raw gh-pages branch URL:
  #   helm repo add aurora https://raw.githubusercontent.com/Arvo-AI/aurora/gh-pages
  #   helm install aurora aurora/aurora
  # ===========================================================================
  publish-ghpages:
    name: Publish to GitHub Pages
    runs-on: ubuntu-24.04
    if: github.repository == 'Arvo-AI/aurora'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: ${{ env.CHART_DIR }}
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

  # ===========================================================================
  # Method 2: OCI push to GHCR
  # Usage:
  #   helm install aurora oci://ghcr.io/arvo-ai/charts/aurora
  # ===========================================================================
  publish-oci:
    name: Publish to GHCR (OCI)
    runs-on: ubuntu-24.04
    if: github.repository == 'Arvo-AI/aurora'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.OCI_REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Package chart
        id: package
        run: |
          helm package ${{ env.CHART_DIR }}/aurora --destination .helm-pkg
          PKG=$(ls .helm-pkg/*.tgz)
          echo "package=$PKG" >> "$GITHUB_OUTPUT"
          echo "Packaged: $PKG"

      - name: Push to GHCR
        run: helm push ${{ steps.package.outputs.package }} oci://${{ env.OCI_REPO }}

  # ===========================================================================
  # Summary
  # ===========================================================================
  publish-summary:
    name: Helm Publish Summary
    runs-on: ubuntu-24.04
    needs: [publish-ghpages, publish-oci]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "================================================"
          echo "Helm Chart Publish Summary"
          echo "================================================"
          echo ""
          echo "GitHub Pages: ${{ needs.publish-ghpages.result }}"
          echo "GHCR OCI:     ${{ needs.publish-oci.result }}"
          echo ""
          echo "Install methods:"
          echo "  helm repo add aurora https://raw.githubusercontent.com/Arvo-AI/aurora/gh-pages"
          echo "  helm install aurora aurora/aurora"
          echo ""
          echo "  helm install aurora oci://ghcr.io/arvo-ai/charts/aurora"
          echo ""
          if [ "${{ needs.publish-ghpages.result }}" != "success" ] || [ "${{ needs.publish-oci.result }}" != "success" ]; then
            echo "One or more publishes failed!"
            exit 1
          fi
          echo "All chart publishes successful"
